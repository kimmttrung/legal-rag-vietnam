<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trợ lý Pháp luật SME — Demo</title>
  <style>
    :root {
      --bg: #0f172a; --panel: #ffffff; --ink: #0f172a; --muted: #64748b;
      --brand: #1d4ed8; --brand-soft: #eff6ff; --border: #e2e8f0; --ok: #059669;
      --shadow: 0 1px 3px rgba(15,23,42,.08), 0 8px 24px rgba(15,23,42,.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(180deg,#f8fafc 0%, #eef2f7 100%); color: var(--ink);
      min-height: 100vh;
    }
    header {
      background: var(--bg); color: #fff; padding: 20px 24px;
    }
    header h1 { margin: 0; font-size: 18px; font-weight: 650; letter-spacing: .2px; }
    header p { margin: 4px 0 0; color: #94a3b8; font-size: 13px; }
    main { max-width: 860px; margin: 0 auto; padding: 24px 16px 64px; }
    .ask {
      display: flex; gap: 8px; background: var(--panel); border: 1px solid var(--border);
      border-radius: 14px; padding: 8px; box-shadow: var(--shadow); position: sticky; top: 12px; z-index: 5;
    }
    .ask textarea {
      flex: 1; border: 0; resize: none; font-size: 15px; padding: 10px 12px; outline: none;
      font-family: inherit; background: transparent; color: var(--ink); max-height: 140px;
    }
    .ask button {
      border: 0; background: var(--brand); color: #fff; font-weight: 600; font-size: 14px;
      padding: 0 20px; border-radius: 10px; cursor: pointer; align-self: stretch;
    }
    .ask button:disabled { background: #94a3b8; cursor: not-allowed; }
    .hint { color: var(--muted); font-size: 12px; margin: 10px 2px 22px; }
    .status { font-size: 13px; color: var(--brand); margin: 18px 2px 8px; min-height: 18px; }
    section h2 {
      font-size: 13px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted);
      margin: 26px 2px 10px;
    }
    .answer {
      background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
      padding: 18px 20px; line-height: 1.7; font-size: 15.5px; box-shadow: var(--shadow);
      white-space: pre-wrap; min-height: 24px;
    }
    .answer.empty { color: var(--muted); font-style: italic; }
    .cards { display: grid; gap: 12px; }
    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 16px; box-shadow: var(--shadow);
    }
    .card .top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .badge {
      background: var(--brand-soft); color: var(--brand); font-size: 12px; font-weight: 650;
      padding: 3px 9px; border-radius: 999px; white-space: nowrap;
    }
    .badge.dieu { background: #f0fdf4; color: var(--ok); }
    .card .name { font-weight: 620; font-size: 14.5px; }
    .card .snippet { color: #334155; font-size: 13.5px; line-height: 1.6; margin: 10px 0 0; }
    .card .foot { margin-top: 12px; }
    .card a.view {
      display: inline-block; font-size: 13px; font-weight: 600; color: var(--brand);
      text-decoration: none; border: 1px solid var(--brand); padding: 6px 12px; border-radius: 8px;
    }
    .card a.view:hover { background: var(--brand-soft); }
    .card .nolink { font-size: 12.5px; color: var(--muted); }
    .blink::after { content: "▍"; color: var(--brand); animation: b 1s steps(1) infinite; }
    @keyframes b { 50% { opacity: 0; } }
    footer { text-align: center; color: var(--muted); font-size: 12px; padding: 24px; }
  </style>
</head>
<body>
  <header>
    <h1>Trợ lý Pháp luật cho Doanh nghiệp nhỏ và vừa</h1>
    <p>Hỏi — Đáp có trích dẫn văn bản pháp luật (RAG · tiếng Việt)</p>
  </header>

  <main>
    <form class="ask" id="form">
      <textarea id="q" rows="1" placeholder="Nhập câu hỏi pháp lý… ví dụ: Doanh nghiệp nhỏ và vừa được hỗ trợ thuế như thế nào?"></textarea>
      <button id="btn" type="submit">Hỏi</button>
    </form>
    <div class="hint">Nhấn Enter để gửi · Shift+Enter để xuống dòng.</div>

    <div class="status" id="status"></div>

    <section id="answerSec" hidden>
      <h2>Câu trả lời</h2>
      <div class="answer empty" id="answer"></div>
    </section>

    <section id="citeSec" hidden>
      <h2>Văn bản trích dẫn</h2>
      <div class="cards" id="cards"></div>
    </section>
  </main>

  <footer>Demo nội bộ · Câu trả lời do AI tạo, vui lòng đối chiếu văn bản gốc trước khi áp dụng.</footer>

  <script>
    const form = document.getElementById("form");
    const q = document.getElementById("q");
    const btn = document.getElementById("btn");
    const statusEl = document.getElementById("status");
    const answerSec = document.getElementById("answerSec");
    const answerEl = document.getElementById("answer");
    const citeSec = document.getElementById("citeSec");
    const cards = document.getElementById("cards");

    q.addEventListener("input", () => {
      q.style.height = "auto";
      q.style.height = Math.min(q.scrollHeight, 140) + "px";
    });
    q.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
    });

    function esc(s) {
      return (s || "").replace(/[&<>"']/g, c => (
        {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]
      ));
    }

    function renderCitations(items) {
      cards.innerHTML = "";
      if (!items || !items.length) {
        citeSec.hidden = true; return;
      }
      citeSec.hidden = false;
      for (const c of items) {
        const div = document.createElement("div");
        div.className = "card";
        const dieu = c.dieu ? `<span class="badge dieu">${esc(c.dieu)}</span>` : "";
        const foot = c.url
          ? `<a class="view" href="${esc(c.url)}" target="_blank" rel="noopener">Xem văn bản ↗</a>`
          : `<span class="nolink">Chưa có link văn bản cho số hiệu này.</span>`;
        div.innerHTML = `
          <div class="top">
            <span class="badge">${esc(c.so_hieu)}</span>
            ${dieu}
            <span class="name">${esc(c.ten_van_ban)}</span>
          </div>
          <p class="snippet">${esc(c.doan_trich)}</p>
          <div class="foot">${foot}</div>`;
        cards.appendChild(div);
      }
    }

    async function ask(question) {
      btn.disabled = true;
      answerSec.hidden = false;
      answerEl.className = "answer empty";
      answerEl.textContent = "";
      citeSec.hidden = true;
      cards.innerHTML = "";
      statusEl.textContent = "Đang truy hồi văn bản liên quan…";

      let answerText = "";
      try {
        const resp = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });
        if (!resp.ok || !resp.body) {
          const t = await resp.text().catch(() => "");
          throw new Error(t || ("HTTP " + resp.status));
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buf = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });

          // Tách theo khối SSE (ngăn cách bằng dòng trống).
          let idx;
          while ((idx = buf.indexOf("\n\n")) >= 0) {
            const raw = buf.slice(0, idx);
            buf = buf.slice(idx + 2);
            let ev = "message", data = "";
            for (const line of raw.split("\n")) {
              if (line.startsWith("event:")) ev = line.slice(6).trim();
              else if (line.startsWith("data:")) data += line.slice(5).trim();
            }
            if (!data) continue;

            if (ev === "citations") {
              const payload = JSON.parse(data);
              renderCitations(payload.citations);
              statusEl.textContent = "Đang soạn câu trả lời…";
            } else if (ev === "token") {
              answerText += JSON.parse(data);
              answerEl.className = "answer blink";
              answerEl.textContent = answerText;
            } else if (ev === "done") {
              const payload = JSON.parse(data);
              if (payload.answer) answerText = payload.answer;
              answerEl.className = "answer";
              answerEl.textContent = answerText;
              statusEl.textContent = "Hoàn tất.";
            } else if (ev === "error") {
              const payload = JSON.parse(data);
              statusEl.textContent = payload.message || "Có lỗi xảy ra.";
              answerEl.className = "answer";
            }
          }
        }
      } catch (err) {
        statusEl.textContent = "Lỗi: " + err.message;
      } finally {
        answerEl.className = answerEl.className.replace(" blink", "");
        btn.disabled = false;
      }
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const question = q.value.trim();
      if (question) ask(question);
    });
  </script>
</body>
</html>
